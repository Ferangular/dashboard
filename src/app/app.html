<div class="app">
  <!-- Enlace de salto al contenido principal (Regla 7) -->
  <a href="#main-content" class="skip-link">Saltar al contenido principal</a>

  <!-- Header como banner landmark a nivel superior -->
  <app-header></app-header>

  <!-- Sidebar como complementary landmark a nivel superior -->
  <aside
    class="app__sidebar"
    [class.app__sidebar--collapsed]="isSidebarCollapsed()"
    aria-label="Menú de navegación principal"
  >
    <app-sidebar></app-sidebar>
  </aside>

  <div class="app__container">
    <div class="app__content-wrapper">
      <main id="main-content" class="app__main" role="main">
        <div class="app__content">
          <router-outlet></router-outlet>
        </div>
      </main>

      <!-- Footer independiente -->
      <div class="app__footer" [class.app__footer--hidden]="!isFooterVisible()">
        @if (isFooterVisible()) {
          <app-footer></app-footer>
        }
      </div>
    </div>
  </div>

  <!-- Botón toggle independiente y flotante -->
  <button class="footer__toggle" (click)="toggleFooter()" aria-label="Toggle footer">
    <span class="footer__toggle-icon">{{ isFooterVisible() ? '&#x25bc;' : '&#x25b2;' }}</span>
  </button>

  <!-- Widget de accesibilidad flotante -->
  <app-accessibility-widget></app-accessibility-widget>
</div>
