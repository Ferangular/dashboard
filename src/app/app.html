<div class="app">
  <app-header class="app__header"></app-header>
  
  <div class="app__container">
    <app-sidebar class="app__sidebar" [class.app__sidebar--collapsed]="isSidebarCollapsed()"></app-sidebar>
    
    <div class="app__content-wrapper">
      <main class="app__main">
        <div class="app__content">
          <router-outlet></router-outlet>
        </div>
      </main>
      
      <!-- Footer independiente -->
      <div class="app__footer" [class.app__footer--hidden]="!isFooterVisible()">
        @if (isFooterVisible()) {
          <app-footer></app-footer>
        }
      </div>
    </div>
  </div>
  
  <!-- Botón toggle independiente y flotante -->
  <button class="footer__toggle" (click)="toggleFooter()" aria-label="Toggle footer">
    <span class="footer__toggle-icon">{{ isFooterVisible() ? '▼' : '▲' }}</span>
  </button>
</div>
