<header class="header">
  <div class="header__container">
    <div class="header__left">
      <button class="header__menu-btn" (click)="toggleSidebar()" aria-label="Toggle sidebar">
        <span class="header__menu-icon">☰</span>
      </button>

      <div class="header__logo">
        <img [src]="appConfig()?.logo" [alt]="appConfig()?.appName" class="header__logo-img">
        <h1 class="header__title">{{ appConfig()?.appName }}</h1>
      </div>
    </div>º

    <div class="header__right">
      <nav class="header__nav">
        <ul class="header__nav-list">
          @for (item of navigationItems; track item.id) {
            <li class="header__nav-item">
              <button
                class="header__nav-btn"
                (click)="navigateTo(item.path)"
                [class.header__nav-btn--active]="router.url === item.path"
              >
                <span class="header__nav-icon">{{ item.label }}</span>
              </button>
            </li>
          }
        </ul>
      </nav>

      <!-- Selector de idiomas -->
      <div class="header__language-selector">
        <select 
          class="header__language-select"
          [value]="currentLanguage()"
          (change)="changeLanguage($any($event.target).value)"
          aria-label="Seleccionar idioma"
        >
          @for (lang of availableLanguages; track lang.code) {
            <option [value]="lang.code">
              {{ lang.flag }} {{ lang.name }}
            </option>
          }
        </select>
      </div>

      @if (appConfig()?.ui?.showEnvironmentBadge) {
        <div class="header__badge">
          <span class="header__badge-text">{{ appConfig()?.environmentName }}</span>
        </div>
      }
    </div>
  </div>
</header>
