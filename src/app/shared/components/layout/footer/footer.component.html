<footer class="footer">
  <div class="footer__container">
    <div class="footer__content">
      <div class="footer__left">
        <p class="footer__app-name">{{ appConfig()?.appName }}</p>
        <p class="footer__description">Laboratorio de Optimización de Rendimiento Angular 21</p>
      </div>
      
      <div class="footer__right">
        <div class="footer__info">
          <span class="footer__version">v1.0.0</span>
          <span class="footer__separator">•</span>
          <span class="footer__year">© {{ currentYear() }}</span>
        </div>
        
        @if (appConfig()?.debug) {
          <div class="footer__debug">
            <span class="footer__debug-badge">DEBUG</span>
          </div>
        }
      </div>
    </div>
  </div>
</footer>
