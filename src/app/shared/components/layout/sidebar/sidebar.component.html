<aside 
  class="sidebar"
  [class.sidebar--collapsed]="isCollapsed()"
  [class.sidebar--mobile-open]="isMobileOpen()"
>
  <div class="sidebar__header">
    <div class="sidebar__logo">
      <span class="sidebar__logo-icon">🚀</span>
      @if (!isCollapsed()) {
        <span class="sidebar__logo-text">Perf Lab</span>
      }
    </div>
    
    <button class="sidebar__toggle" (click)="toggleCollapse()" aria-label="Toggle sidebar">
      <span class="sidebar__toggle-icon">{{ isCollapsed() ? '→' : '←' }}</span>
    </button>
  </div>

  <nav class="sidebar__nav">
    <ul class="sidebar__nav-list">
      @for (item of navigationItems; track item.id) {
        <li class="sidebar__nav-item">
          <button 
            class="sidebar__nav-btn"
            [class.sidebar__nav-btn--active]="isActive(item.path)"
            (click)="navigateTo(item.path)"
          >
            <span class="sidebar__nav-icon">{{ item.icon }}</span>
            @if (!isCollapsed()) {
              <span class="sidebar__nav-label">{{ item.label }}</span>
            }
          </button>
        </li>
      }
    </ul>
  </nav>

  <div class="sidebar__footer">
    @if (!isCollapsed()) {
      <div class="sidebar__info">
        <p class="sidebar__info-text">Angular 21 Performance Lab</p>
        <p class="sidebar__info-version">v1.0.0</p>
      </div>
    }
  </div>
</aside>
